version: "1.0"

# 论文主指标口径（保持与现有文献可比）
primary_metric: "doc_role_micro_f1"
academic_profile: "dual"

# 仅用于辅助分析，不改变主指标
canonical_metric_mode: "analysis_only"

evaluation:
  split: "dev"
  seeds: [3407, 3408, 3409]
  bootstrap_samples: 1000
  concurrency: 8
  significance: "paired_permutation"
  confidence: 0.95

reporting:
  include_auxiliary_canonical_metrics: true
  enforce_protocol_match: true
  include_schema_compliance: true
  include_hallucination: true
  academic_main_metrics:
    - "doc_role_micro_f1"
    - "doc_instance_micro_f1"
    - "doc_combination_micro_f1"
    - "doc_event_type_micro_f1"
    - "single_event_doc_role_micro_f1"
    - "multi_event_doc_role_micro_f1"

research_design:
  dev_usage: "final_report_only"
  tuning_source: "train_tune"
  fewshot_pool_source: "train_fit"
  split_seed: 3407
  train_tune_ratio: 0.1
  allow_gold_type_injection: false
  allow_dev_tuning: false

metrics:
  version: "2.0"
  report_level: "core_plus_diagnostics"   # core_only | core_plus_diagnostics
  cot:
    enabled: false
    mode: "strict_span"                   # strict_span | weak_mention
    require_thought_block: false
    eval_mode: "self_consistency"         # self_consistency | counterfactual
    counterfactual:
      enabled: false
      num_perturb: 1
      target_types: ["number", "date", "org"]
  relaxed:
    match_mode: "include_or_char_overlap" # include_or_char_overlap | span_iou
    char_overlap_threshold: 0.5
    span_iou_threshold: 0.5
  hallucination:
    match_mode: "normalized_substring"    # normalized_substring | exact_span
  schema:
    mode: "schema_strict"                 # syntax_only | schema_strict
